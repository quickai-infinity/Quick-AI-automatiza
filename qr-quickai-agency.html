<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code - quickai.agency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
    background: #0f0f0f; color: #fff;
  }
  .container { text-align: center; padding: 40px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; color: #e0e0e0; }
  .url { color: #4fc3f7; font-size: 1.1rem; margin-bottom: 30px; }
  #qrcode { 
    display: inline-block; background: #fff; padding: 24px; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(79,195,247,0.15);
  }
  .btn {
    display: inline-block; margin-top: 24px; padding: 14px 36px;
    background: #4fc3f7; color: #000; font-weight: 700; font-size: 1rem;
    border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
  }
  .btn:hover { background: #81d4fa; }
  .note { margin-top: 16px; color: #888; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
  <h1>QuickAI Agency</h1>
  <p class="url">https://quickai.agency</p>
  <div id="qrcode"></div>
  <br>
  <button class="btn" onclick="downloadQR()">Download PNG</button>
  <p class="note">Este QR es gratis para siempre. Es solo una imagen.</p>
</div>
<script>
  const qr = new QRCode(document.getElementById("qrcode"), {
    text: "https://quickai.agency",
    width: 300,
    height: 300,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  function downloadQR() {
    setTimeout(() => {
      const canvas = document.querySelector('#qrcode canvas');
      if (canvas) {
        const link = document.createElement('a');
        link.download = 'qr-quickai-agency.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } else {
        const img = document.querySelector('#qrcode img');
        if (img) {
          const link = document.createElement('a');
          link.download = 'qr-quickai-agency.png';
          link.href = img.src;
          link.click();
        }
      }
    }, 100);
  }
</script>
</body>
</html>
